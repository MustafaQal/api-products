<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./assets/css/main.css" />
</head>

<body>

    <!-- NOTE: UI/UX design created by AI and edited by me -->

    <body class="bg-gray-50 text-gray-900">
        <!-- Navbar -->
        <nav class="bg-white shadow-md sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <h1 class="text-2xl font-bold">Mustafa Store</h1>
                <ul class="flex gap-6 font-medium">
                    <li><a href="#" class="hover:text-blue-600">Home</a></li>
                    <li><a href="#categories" class="hover:text-blue-600">Categories</a></li>
                    <li><a href="#" class="hover:text-blue-600">Contact</a></li>
                </ul>
            </div>
        </nav>

        <!-- Hero -->
        <section class="bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-24 text-center">
            <h2 class="text-5xl font-bold mb-4">Welcome to Mustafa Store</h2>
            <p class="text-lg mb-8">Discover amazing product categories instantly</p>
            <button class="bg-white text-blue-600 px-6 py-3 rounded-xl font-semibold hover:scale-105 transition">
                Explore Now
            </button>
        </section>

        <!-- Categories -->

        <section class="categories max-w-7xl mx-auto px-6 py-16">
            <h3 class="text-3xl font-bold mb-8 text-center">Categories</h3>
            <div class="categoryList grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <!-- Mustafa: hon bdna ndeef data-->
            </div>
        </section>

        <!-- Products -->
        <section class="max-w-7xl mx-auto px-6 py-16">
            <h3 class="text-3xl font-bold mb-8 text-center">Products</h3>
            <div class="productList grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </section>

        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script src="./assets/js/main.js"> </script>
    </body>

</html>
